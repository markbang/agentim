name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish or repair (for example: v0.3.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  GH_REPO: ${{ github.repository }}

jobs:
  ensure-release:
    name: Ensure Release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GH_REPO" \
              --verify-tag \
              --generate-notes \
              --title "Release $RELEASE_TAG"
          fi

  build-release:
    name: Build Release (${{ matrix.archive_name }})
    needs: ensure-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: agentim
            archive_name: agentim-linux-x86_64.tar.gz
            checksum_name: agentim-linux-x86_64.tar.gz.sha256
            package_dir: agentim-linux-x86_64
            legacy_asset_name: agentim-linux-x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: agentim
            archive_name: agentim-macos-x86_64.tar.gz
            checksum_name: agentim-macos-x86_64.tar.gz.sha256
            package_dir: agentim-macos-x86_64
            legacy_asset_name: agentim-macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            binary_name: agentim
            archive_name: agentim-macos-aarch64.tar.gz
            checksum_name: agentim-macos-aarch64.tar.gz.sha256
            package_dir: agentim-macos-aarch64
            legacy_asset_name: agentim-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: agentim.exe
            archive_name: agentim-windows-x86_64.zip
            checksum_name: agentim-windows-x86_64.zip.sha256
            package_dir: agentim-windows-x86_64
            legacy_asset_name: agentim-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Remove legacy raw asset on reruns
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete-asset "$RELEASE_TAG" "${{ matrix.legacy_asset_name }}" --repo "$GH_REPO" --yes || true
      - name: Prepare archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist "${{ matrix.package_dir }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ matrix.package_dir }}/${{ matrix.binary_name }}"
          cp README.md "${{ matrix.package_dir }}/README.md"
          tar -czf "dist/${{ matrix.archive_name }}" "${{ matrix.package_dir }}"
          (
            cd dist
            shasum -a 256 "${{ matrix.archive_name }}" > "${{ matrix.checksum_name }}"
          )
      - name: Prepare archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ matrix.package_dir }}" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ matrix.package_dir }}/${{ matrix.binary_name }}"
          Copy-Item "README.md" "${{ matrix.package_dir }}/README.md"
          Compress-Archive -Path "${{ matrix.package_dir }}" -DestinationPath "dist/${{ matrix.archive_name }}" -Force
          $hash = (Get-FileHash "dist/${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content "dist/${{ matrix.checksum_name }}" "$hash  ${{ matrix.archive_name }}"
      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "./dist/${{ matrix.archive_name }}" \
            "./dist/${{ matrix.checksum_name }}" \
            --repo "$GH_REPO" \
            --clobber

default_stages = ["pre-commit"]
default_install_hook_types = ["pre-commit", "pre-push"]

[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"
args = ["--markdown-linebreak-ext=md"]
priority = 0

[[repos.hooks]]
id = "end-of-file-fixer"
priority = 10

[[repos.hooks]]
id = "check-merge-conflict"
args = ["--assume-in-merge"]
priority = 30

[[repos.hooks]]
id = "check-yaml"
priority = 30

[[repos.hooks]]
id = "check-toml"
priority = 30

[[repos.hooks]]
id = "check-json"
files = "\\.json(\\.example)?$"
priority = 30

[[repos.hooks]]
id = "check-executables-have-shebangs"
priority = 30

[[repos.hooks]]
id = "check-shebang-scripts-are-executable"
exclude = "\\.rs$"
priority = 30

[[repos.hooks]]
id = "detect-private-key"
priority = 30

[[repos]]
repo = "local"

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
language = "system"
entry = "cargo fmt --all"
files = "\\.rs$"
pass_filenames = false
require_serial = true
priority = 20

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
language = "system"
entry = "cargo clippy --all-targets --all-features -- -D warnings"
always_run = true
pass_filenames = false
require_serial = true
stages = ["pre-push"]
priority = 40

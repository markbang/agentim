version: '3.8'

services:
  agentim:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - ./state:/app/state
    environment:
      - RUST_LOG=info
      # Copy agentim.json.example to ./config/agentim.json before starting compose.
      - AGENTIM_CONFIG_FILE=/app/config/agentim.json
      - AGENTIM_STATE_FILE=/app/state/sessions.json
      # If you use the recommended ACP backend inside the container,
      # make sure the agent binary exists inside the image and then set:
      # - AGENTIM_ACP_COMMAND=/usr/local/bin/your-coding-agent
      # - AGENTIM_ACP_CWD=/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Redis for session caching (future use)
  # redis:
  #   image: redis:7-alpine
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

# volumes:
#   redis_data:

version: '3.8'

services:
  agentim:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - ./state:/app/state
    environment:
      - RUST_LOG=info
      - AGENTIM_CONFIG=/app/config/config.json
      - AGENTIM_STATE=/app/state/sessions.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Redis for session caching (future use)
